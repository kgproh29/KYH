name: Daily Blog Generator
on:
  schedule:
    - cron: '*/5 * * * *' # รันทุกๆ 5 นาที
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install google-generativeai
      - name: Run Generator
        env:
          GEMINI_API_KEY: ${{ secrets.KYHGEMINIBLOG }}
        run: python scripts/generate_blog.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posts/blog-posts.json
          git commit -m "Auto-update blog content via Gemini"
          git push
