name: Auto Daily Blog Generator (Gemini New SDK)

on:
  schedule:
    - cron: '0 18 * * *' # รันทุกวันเวลา ตี 1 (เวลาไทย)
  workflow_dispatch: # เปิดให้กดรันเองผ่านหน้าเว็บได้

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # แก้ไขตรงนี้ให้ติดตั้ง SDK ตัวใหม่ล่าสุดของ Google
    - name: Install dependencies
      run: |
        pip install google-genai

    # ส่งคีย์รันสคริปต์ (SDK ใหม่จะดึงค่า GEMINI_API_KEY ไปใช้โดยตรง)
    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_article.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add posts/blog-posts.json
        git diff-index --quiet HEAD || git commit -m "Automated daily blog by Gemini SDK v2 - $(date +'%Y-%m-%d')"
        git push
