name: Auto Daily Blog Generator (Gemini)

on:
  schedule:
    - cron: '0 18 * * *' # รันทุกวันเวลา ตี 1 (เวลาไทย)
  workflow_dispatch: # ปุ่มกดรันเทสเองมือ

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install google-generativeai

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_article.py

    # แก้ไขคำสั่งตรวจสอบและ Push ไฟล์ JSON กลับขึ้นระบบ
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add posts/blog-posts.json
        git diff-index --quiet HEAD || git commit -m "Automated daily blog updated in JSON - $(date +'%Y-%m-%d')"
        git push
